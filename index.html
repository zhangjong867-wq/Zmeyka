<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ретро Змейка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-canvas {
            border: 4px solid #334155;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: #020617;
            image-rendering: pixelated;
        }
        .control-btn {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Заголовок и счет -->
    <div class="text-center mb-4">
        <h1 class="text-4xl font-bold text-emerald-400 mb-2">ЗМЕЙКА</h1>
        <div class="flex gap-8 justify-center text-xl">
            <p>Счет: <span id="score" class="font-mono text-emerald-300">0</span></p>
            <p>Рекорд: <span id="high-score" class="font-mono text-amber-400">0</span></p>
        </div>
    </div>

    <!-- Игровое поле -->
    <div class="relative">
        <canvas id="game-canvas"></canvas>
        
        <!-- Экран проигрыша -->
        <div id="game-over" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center rounded-lg">
            <h2 class="text-3xl font-bold text-red-500 mb-4">ИГРА ОКОНЧЕНА</h2>
            <button onclick="resetGame()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-full font-bold transition-all transform active:scale-95">
                ИГРАТЬ СНОВА
            </button>
        </div>
    </div>

    <!-- Мобильное управление -->
    <div class="mt-8 grid grid-cols-3 gap-2 md:hidden">
        <div></div>
        <button onpointerdown="changeDirection('up')" class="control-btn w-16 h-16 bg-slate-700 rounded-lg flex items-center justify-center active:bg-slate-600">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
        </button>
        <div></div>
        <button onpointerdown="changeDirection('left')" class="control-btn w-16 h-16 bg-slate-700 rounded-lg flex items-center justify-center active:bg-slate-600">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <button onpointerdown="changeDirection('down')" class="control-btn w-16 h-16 bg-slate-700 rounded-lg flex items-center justify-center active:bg-slate-600">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <button onpointerdown="changeDirection('right')" class="control-btn w-16 h-16 bg-slate-700 rounded-lg flex items-center justify-center active:bg-slate-600">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>
    </div>

    <p class="mt-6 text-slate-400 text-sm hidden md:block">Используйте стрелки на клавиатуре для управления</p>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const gameOverScreen = document.getElementById('game-over');

        // Настройки игры
        const gridSize = 20;
        let tileCountX, tileCountY;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.textContent = highScore;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let gameLoop;
        let isGameOver = false;

        function init() {
            // Адаптивный размер канваса
            const size = Math.min(window.innerWidth - 40, 400);
            canvas.width = Math.floor(size / gridSize) * gridSize;
            canvas.height = canvas.width;
            tileCountX = canvas.width / gridSize;
            tileCountY = canvas.height / gridSize;
            
            resetGame();
        }

        function resetGame() {
            snake = [
                {x: Math.floor(tileCountX/2), y: Math.floor(tileCountY/2)},
                {x: Math.floor(tileCountX/2), y: Math.floor(tileCountY/2) + 1},
                {x: Math.floor(tileCountX/2), y: Math.floor(tileCountY/2) + 2}
            ];
            dx = 0;
            dy = -1;
            nextDx = 0;
            nextDy = -1;
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            gameOverScreen.classList.add('hidden');
            createFood();
            
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCountX),
                y: Math.floor(Math.random() * tileCountY)
            };
            // Проверка, чтобы еда не появилась внутри змейки
            snake.forEach(part => {
                if(part.x === food.x && part.y === food.y) createFood();
            });
        }

        function draw() {
            if (isGameOver) return;

            // Обновляем текущее направление из буфера (защита от быстрого нажатия)
            dx = nextDx;
            dy = nextDy;

            // Двигаем голову
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Проверка столкновений со стенами
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                return endGame();
            }

            // Проверка столкновения с самим собой
            for(let i = 0; i < snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) return endGame();
            }

            snake.unshift(head);

            // Проверка поедания еды
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                if(score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                createFood();
            } else {
                snake.pop();
            }

            // Отрисовка
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем еду
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2.5, 0, Math.PI*2);
            ctx.fill();

            // Рисуем змейку
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#10b981' : '#059669';
                ctx.strokeStyle = '#020617';
                ctx.lineWidth = 2;
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                
                // Глазки для головы
                if(index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 3;
                    ctx.fillRect(part.x * gridSize + 4, part.y * gridSize + 4, eyeSize, eyeSize);
                    ctx.fillRect(part.x * gridSize + gridSize - 7, part.y * gridSize + 4, eyeSize, eyeSize);
                }
            });
        }

        function endGame() {
            isGameOver = true;
            gameOverScreen.classList.remove('hidden');
            clearInterval(gameLoop);
        }

        function changeDirection(dir) {
            if (isGameOver) return;
            
            switch(dir) {
                case 'up': if(dy !== 1) { nextDx = 0; nextDy = -1; } break;
                case 'down': if(dy !== -1) { nextDx = 0; nextDy = 1; } break;
                case 'left': if(dx !== 1) { nextDx = -1; nextDy = 0; } break;
                case 'right': if(dx !== -1) { nextDx = 1; nextDy = 0; } break;
            }
        }

        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': changeDirection('up'); break;
                case 'ArrowDown': changeDirection('down'); break;
                case 'ArrowLeft': changeDirection('left'); break;
                case 'ArrowRight': changeDirection('right'); break;
            }
        });

        window.onload = init;
    </script>
</body>
</html>
