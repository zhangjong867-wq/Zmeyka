<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Космический Защитник</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #020617;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        .ui-layer {
            pointer-events: none;
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .touch-controls {
            pointer-events: auto;
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
        }
        @media (min-width: 768px) {
            .touch-controls { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="flex justify-between items-start pointer-events-auto">
            <div>
                <p class="text-slate-400 text-sm uppercase tracking-widest">Счет</p>
                <p id="score" class="text-3xl font-bold text-cyan-400">0</p>
            </div>
            <div class="text-right">
                <p class="text-slate-400 text-sm uppercase tracking-widest">Жизни</p>
                <div id="lives" class="text-2xl text-red-500">❤️❤️❤️</div>
            </div>
        </div>

        <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 pointer-events-auto">
            <h1 class="text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">SPACE DEFENDER</h1>
            <p class="text-slate-300 mb-8 text-center max-w-xs">Сбивайте астероиды и не дайте им упасть! <br> Управление: Мышь или Касание</p>
            <button id="startBtn" class="px-10 py-4 bg-cyan-600 hover:bg-cyan-500 rounded-full font-bold text-xl transition-all transform hover:scale-110 active:scale-95 shadow-lg shadow-cyan-900/20">
                НАЧАТЬ МИССИЮ
            </button>
        </div>

        <div id="gameOverScreen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-red-950/90 pointer-events-auto">
            <h2 class="text-6xl font-black mb-2 text-white">КАТАСТРОФА</h2>
            <p id="finalScore" class="text-2xl text-red-200 mb-8 font-mono">Ваш счет: 0</p>
            <button id="restartBtn" class="px-8 py-3 bg-white text-red-900 rounded-full font-bold text-lg hover:bg-red-100 transition-all">
                ПОПРОБОВАТЬ СНОВА
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');

        // Глобальные переменные
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let player, projectiles, enemies, particles, stars;
        let animationId;
        let spawnRate = 1000;
        let lastSpawn = 0;

        class Player {
            constructor() {
                this.width = 40;
                this.height = 30;
                this.x = canvas.width / 2;
                this.y = canvas.height - 60;
                this.targetX = this.x;
                this.speed = 0.15;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Тело корабля
                ctx.fillStyle = '#22d3ee';
                ctx.beginPath();
                ctx.moveTo(0, -20);
                ctx.lineTo(20, 10);
                ctx.lineTo(-20, 10);
                ctx.closePath();
                ctx.fill();

                // Огни двигателя
                ctx.fillStyle = Math.random() > 0.5 ? '#f87171' : '#facc15';
                ctx.fillRect(-5, 10, 10, 5);
                
                ctx.restore();
            }

            update() {
                // Плавное следование за мышью/тачем
                let dx = this.targetX - this.x;
                this.x += dx * this.speed;
                
                // Границы экрана
                if (this.x < 20) this.x = 20;
                if (this.x > canvas.width - 20) this.x = canvas.width - 20;
            }
        }

        class Projectile {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 3;
                this.speed = 8;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#67e8f9';
                ctx.fill();
                // Свечение
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#06b6d4';
            }

            update() {
                this.y -= this.speed;
            }
        }

        class Enemy {
            constructor() {
                this.radius = Math.random() * 20 + 10;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 2 + 1.5;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 2;
                
                // Рисуем многоугольник (астероид)
                ctx.beginPath();
                for (let i = 0; i < 7; i++) {
                    let angle = (i / 7) * Math.PI * 2;
                    let r = this.radius * (0.8 + Math.random() * 0.4);
                    ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 5,
                    y: (Math.random() - 0.5) * 5
                };
                this.alpha = 1;
                this.friction = 0.97;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.02;
            }
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (player) player.x = canvas.width / 2;
            createStars();
        }

        function init() {
            player = new Player();
            projectiles = [];
            enemies = [];
            particles = [];
            score = 0;
            lives = 3;
            spawnRate = 1000;
            scoreEl.innerText = score;
            livesEl.innerText = '❤️❤️❤️';
            gameActive = true;
            animate();
        }

        function spawnEnemy(timestamp) {
            if (timestamp - lastSpawn > spawnRate) {
                enemies.push(new Enemy());
                lastSpawn = timestamp;
                if (spawnRate > 400) spawnRate -= 5; // Постепенное усложнение
            }
        }

        function animate(timestamp) {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);
            
            // Чистка холста
            ctx.fillStyle = 'rgba(2, 6, 23, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Звезды
            stars.forEach(star => {
                ctx.fillStyle = 'white';
                ctx.fillRect(star.x, star.y, star.size, star.size);
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });

            player.update();
            player.draw();

            particles.forEach((particle, index) => {
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    particle.update();
                    particle.draw();
                }
            });

            projectiles.forEach((proj, index) => {
                proj.update();
                proj.draw();
                if (proj.y < 0) projectiles.splice(index, 1);
            });

            spawnEnemy(timestamp);

            enemies.forEach((enemy, eIndex) => {
                enemy.update();
                enemy.draw();

                // Проверка столкновения с игроком
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer < enemy.radius + 15) {
                    loseLife();
                    enemies.splice(eIndex, 1);
                }

                // Проверка выхода за экран (урон базе)
                if (enemy.y > canvas.height + enemy.radius) {
                    enemies.splice(eIndex, 1);
                    loseLife();
                }

                // Столкновение с пулями
                projectiles.forEach((proj, pIndex) => {
                    const dist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                    if (dist < enemy.radius) {
                        // Взрыв
                        for (let i = 0; i < 8; i++) {
                            particles.push(new Particle(enemy.x, enemy.y, '#94a3b8'));
                        }
                        
                        enemies.splice(eIndex, 1);
                        projectiles.splice(pIndex, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });
            });
        }

        function loseLife() {
            lives--;
            livesEl.innerText = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
            
            // Вспышка экрана
            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (lives <= 0) {
                gameActive = false;
                finalScoreEl.innerText = `Ваш счет: ${score}`;
                gameOverScreen.classList.remove('hidden');
            }
        }

        // События управления
        window.addEventListener('mousemove', (e) => {
            if (player) player.targetX = e.clientX;
        });

        window.addEventListener('touchmove', (e) => {
            if (player) {
                player.targetX = e.touches[0].clientX;
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('mousedown', () => {
            if (gameActive) projectiles.push(new Projectile(player.x, player.y - 20));
        });

        window.addEventListener('touchstart', (e) => {
            if (gameActive) {
                projectiles.push(new Projectile(player.x, player.y - 20));
            }
        });

        document.getElementById('startBtn').onclick = () => {
            startScreen.classList.add('hidden');
            init();
        };

        document.getElementById('restartBtn').onclick = () => {
            gameOverScreen.classList.add('hidden');
            init();
        };

        window.addEventListener('resize', resize);
        resize();

    </script>
</body>
</html>
